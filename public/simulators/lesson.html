<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parlemoi Lesson Flow Simulator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #1B2A4A;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        body.embed {
            background: transparent;
            padding: 0;
        }
        body.embed {
            display: grid;
            place-items: start center;
            align-content: start;
            overflow: hidden;
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        .mockup {
            width: 411px;
            height: 915px;
            background: #000;
            border-radius: 48px;
            border: 14px solid #000;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
        }
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 146px;
            height: 34px;
            background: #000;
            border-radius: 0 0 22px 22px;
            z-index: 100;
        }
        .screen {
            width: 100%;
            height: 100%;
            background: #FBF5EF;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .status-bar { height: 44px; flex-shrink: 0; }
        .lesson-header { padding: 4px 16px; flex-shrink: 0; }
        .header-row { display: flex; align-items: center; height: 32px; position: relative; }
        /* LessonPlayer.tsx: Pressable backButton + ChevronLeft 22, textSecondary */
        .back-btn {
            width: 32px; height: 32px; border-radius: 16px; background: transparent; border: none;
            display: flex; align-items: center; justify-content: center; color: #6B6B6B;
            position: absolute; left: 0; z-index: 1; cursor: pointer; padding: 0;
        }
        .back-btn:focus-visible {
            outline: 2px solid rgba(232, 134, 58, 0.35);
            outline-offset: 2px;
        }
        .lesson-title { flex: 1; text-align: center; color: #2C2C2C; font-size: 15px; font-weight: 600; }
        .sim-tag { text-align: center; font-size: 11px; color: #9B9B9B; margin-top: 2px; padding: 0 24px; min-height: 14px; }
        .progress-wrap { padding: 0 20px; transition: opacity 0.2s ease; }
        .progress-track { height: 4px; background: #E8E3DC; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 4px; background: #1B2A4A; border-radius: 2px; width: 0%; transition: width 0.3s ease; }
        .progress-label { font-size: 12px; color: #9B9B9B; text-align: right; margin-top: 4px; min-height: 16px; }
        .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

        .scroll-area { flex: 1; overflow-y: auto; padding: 24px 24px 150px; }
        .center-content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 48px 32px 0; }

        .narration-block {
            border-left: 3px solid rgba(232,134,58,0.4);
            padding: 8px 0 8px 14px;
            animation: fadeInUp 0.28s ease;
        }
        .narration-text { color: #2C2C2C; font-size: 17px; line-height: 26px; letter-spacing: 0.15px; }
        .french-hl { color: #E8863A; font-weight: 700; }
        .translation-hl { color: #6B6B6B; font-style: italic; }

        .vocab-section { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
        .vocab-card {
            display: flex; align-items: center; background: #FFF; border-radius: 12px; padding: 14px;
            border: 1px solid #E8E3DC; border-left: 3px solid #E8863A; gap: 12px;
            animation: slideIn 0.35s ease forwards; opacity: 0;
        }
        .vocab-play {
            width: 36px; height: 36px; border-radius: 18px; background: rgba(232,134,58,0.1);
            display: flex; align-items: center; justify-content: center; color: #E8863A; border: none;
        }
        .vocab-play svg { width: 16px; height: 16px; }
        .vocab-fr { color: #E8863A; font-size: 17px; font-weight: 600; }
        .vocab-en { color: #6B6B6B; font-size: 14px; margin-top: 2px; }

        .card {
            background: #FFF; border-radius: 16px; padding: 20px; width: 100%; min-height: 150px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 2px solid transparent; box-shadow: 0 2px 8px rgba(0,0,0,0.08); position: relative;
        }
        .card.pass { border-color: #4CAF7D; animation: bubblePulse 0.24s ease; }
        .card.fail { border-color: #D35454; animation: bubblePulse 0.24s ease; }
        .icon-btn {
            position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; border-radius: 16px;
            background: rgba(232,134,58,0.08); display: flex; align-items: center; justify-content: center;
            color: #E8863A; border: none; z-index: 1; cursor: pointer;
        }
        .icon-btn.pass { background: rgba(76,175,80,0.1); color: #4CAF7D; }
        .icon-btn.fail { background: rgba(211,84,84,0.1); color: #D35454; }
        .text-area { width: 100%; text-align: center; padding: 0 40px; }
        .french-text {
            color: #E8863A; font-size: 28px; font-weight: 700; font-family: Georgia, serif;
            text-align: center; line-height: 1.25;
        }
        .english-hint { color: #9B9B9B; font-size: 14px; margin-top: 4px; text-align: center; }
        .result-slot {
            min-height: 64px; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
        }
        .prompt-label {
            color: #9B9B9B; font-size: 13px; font-weight: 600; letter-spacing: 1.2px; margin-top: 16px; text-align: center;
        }
        .transcript {
            color: #6B6B6B; font-size: 18px; line-height: 24px; font-style: italic; text-align: center;
            margin-top: 4px; width: 100%; animation: fadeIn 0.18s ease;
        }
        .transcript.pass { color: #4CAF7D; }
        .transcript.fail { color: #D35454; }
        .score-pill {
            display: flex; align-items: center; justify-content: center; gap: 6px; min-width: 100px;
            background: rgba(76,175,80,0.1); padding: 4px 12px; border-radius: 999px; margin-top: 6px;
            animation: pillPop 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        .score-pill.warn { background: rgba(232,134,58,0.1); border: 1px solid rgba(232,134,58,0.2); }
        .score-pct { color: #4CAF7D; font-size: 14px; font-weight: 700; }
        .score-lbl { color: #4CAF7D; font-size: 12px; font-weight: 500; }
        .score-pct.warn, .score-lbl.warn { color: #D4A853; }
        .feedback-stack { width: 100%; margin-top: 14px; }
        .retry-area { text-align: center; margin-top: 8px; }
        .retry-score-big { color: #D35454; font-size: 24px; font-weight: 700; }
        .retry-lbl { color: #6B6B6B; font-size: 15px; margin-top: 8px; margin-bottom: 8px; }
        .listen-btn-sm {
            display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 10px;
            background: rgba(232,134,58,0.1); color: #E8863A; font-size: 14px; font-weight: 500; border: none; cursor: pointer;
        }

        .bottom-abs {
            position: absolute; bottom: 0; left: 0; right: 0; background: #FBF5EF;
            padding: 20px 24px 28px; display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .bottom-area {
            padding: 0 24px 28px; display: flex; flex-direction: column; align-items: center;
            min-height: 130px; flex-shrink: 0;
        }
        .mic-btn {
            width: 120px; height: 120px; border-radius: 60px;
            background: #1B2A4A; border: 4px solid #E8863A;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s ease;
            user-select: none; -webkit-user-select: none;
        }
        .mic-btn svg { width: 36px; height: 36px; color: #FFF; pointer-events: none; }
        .mic-btn.recording { background: #E8863A; border-color: #F4A261; }
        .mic-btn.pulse { animation: micPulse 1.2s ease-in-out infinite; }
        .mic-btn:disabled { opacity: 0.5; cursor: default; }
        .mic-hint {
            color: #9B9B9B; font-size: 13px; line-height: 18px; margin-top: 10px; text-align: center; min-height: 18px;
        }
        .btn-primary {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: #1B2A4A; border-radius: 14px; padding: 16px 48px;
            color: #FFF; font-size: 17px; font-weight: 700; border: none; cursor: pointer;
        }
        .btn-primary svg { width: 18px; height: 18px; color: #FFF; }
        .retry-button {
            display: flex; align-items: center; gap: 6px; margin-top: 14px;
            padding: 10px 20px; border-radius: 10px; border: 1.5px solid #1B2A4A;
            background: transparent; color: #1B2A4A; font-size: 15px; font-weight: 600; cursor: pointer;
        }
        .retry-button svg { width: 14px; height: 14px; color: #1B2A4A; }

        .start-wrap { flex: 1; overflow-y: auto; padding: 20px 24px 28px; }
        .start-title { color: #2C2C2C; font-size: 24px; font-weight: 700; margin-top: 8px; }
        .start-sub { color: #6B6B6B; font-size: 14px; line-height: 21px; margin-top: 8px; }
        .lesson-list { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .lesson-card {
            width: 100%; text-align: left; background: #FFF; border: 1px solid #E8E3DC; border-radius: 14px;
            padding: 14px; display: flex; flex-direction: column; gap: 5px;
        }
        .launcher-title { color: #2C2C2C; font-size: 24px; font-weight: 700; margin-top: 8px; }
        .launcher-sub { color: #6B6B6B; font-size: 14px; line-height: 21px; margin-top: 8px; }
        .lesson-chip { color: #1B2A4A; font-size: 11px; font-weight: 700; letter-spacing: 0.7px; text-transform: uppercase; }
        .lesson-name { color: #2C2C2C; font-size: 18px; font-weight: 700; }
        .lesson-desc { color: #6B6B6B; font-size: 13px; line-height: 18px; }

        .results-wrap { flex: 1; overflow-y: auto; padding: 24px 24px 155px; }
        .stars-row { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .star { width: 28px; height: 28px; color: #DCD3C6; }
        .fill .star { color: #F0C84B; }
        .results-title { text-align: center; color: #2C2C2C; font-size: 28px; font-weight: 700; margin-top: 16px; }
        .xp-badge {
            margin: 12px auto 0; width: fit-content; background: rgba(232,134,58,0.1); color: #E8863A;
            font-size: 18px; font-weight: 700; padding: 6px 16px; border-radius: 12px;
        }
        .score-grid { margin-top: 18px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .score-card {
            background: #FFF; border: 1px solid #E8E3DC; border-radius: 12px; padding: 12px 8px; text-align: center;
        }
        .score-value { color: #1B2A4A; font-size: 22px; font-weight: 700; }
        .score-label { color: #9B9B9B; font-size: 11px; margin-top: 3px; }
        .section-title { color: #2C2C2C; font-size: 17px; font-weight: 600; margin-top: 22px; margin-bottom: 10px; }
        .vocab-row {
            display: flex; align-items: center; gap: 10px; background: #FFF; border: 1px solid #E8E3DC; border-radius: 10px;
            padding: 11px; margin-bottom: 6px;
        }
        .vocab-row .vocab-fr { font-size: 15px; }
        .vocab-row .vocab-en { margin-left: auto; font-size: 14px; text-align: right; }
        .game-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; background: #E8863A; color: #FFF; border: none; border-radius: 14px;
            padding: 15px 12px; font-size: 17px; font-weight: 700;
        }
        .results-bottom {
            position: absolute; bottom: 0; left: 0; right: 0; background: #FBF5EF;
            padding: 20px 20px 36px; display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .back-lessons {
            border: none; background: transparent; color: #1B2A4A; font-size: 14px; font-weight: 500; display: flex; gap: 6px; align-items: center;
        }

        .game-sim {
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 24px;
        }
        .game-badge {
            background: rgba(27,42,74,0.08); color: #1B2A4A; border-radius: 999px; padding: 6px 12px; font-size: 12px; font-weight: 700;
            letter-spacing: 0.5px; text-transform: uppercase;
        }
        .game-title { color: #2C2C2C; font-size: 24px; font-weight: 700; margin-top: 16px; }
        .game-sub { color: #6B6B6B; font-size: 14px; margin-top: 8px; line-height: 20px; max-width: 290px; }
        .ghost-btn {
            margin-top: 16px; border: 1.5px solid #1B2A4A; border-radius: 12px; background: transparent;
            color: #1B2A4A; font-size: 15px; font-weight: 600; padding: 10px 18px;
        }
        .dialogue-card-shell {
            width: 100%; text-align: left; background: #FFF; border: 1px solid #E8E3DC; border-radius: 14px;
            padding: 14px; display: flex; flex-direction: column; gap: 5px;
        }
        .lesson-actions { display: flex; gap: 8px; margin-top: 8px; }
        .lesson-action {
            border: none; border-radius: 10px; font-weight: 700; font-size: 13px; padding: 9px 10px; cursor: pointer;
        }
        .lesson-action.primary { background: #1B2A4A; color: #FFF; }
        .lesson-action.secondary { background: rgba(27,42,74,0.08); color: #1B2A4A; }

        .dialogue-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .dialogue-header {
            color: #6B6B6B; font-size: 15px; font-weight: 500; padding: 12px 24px 8px;
        }
        .chat-area { flex: 1; overflow-y: auto; }
        .chat-content { padding: 16px 24px 32px; display: flex; flex-direction: column; gap: 10px; }
        .bubble {
            max-width: 80%;
            border-radius: 14px;
            padding: 14px;
            animation: fadeInUp 0.2s ease;
        }
        .tutor-bubble {
            align-self: flex-start; background: #FFF; border: 1px solid #E8E3DC; border-bottom-left-radius: 4px;
        }
        .user-bubble {
            align-self: flex-end; background: rgba(27,42,74,0.06); border-bottom-right-radius: 4px;
        }
        .bubble-speaker {
            color: #9B9B9B; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;
        }
        .bubble-fr {
            font-size: 16px; font-weight: 600; line-height: 22px;
        }
        .bubble-fr.tutor { color: #2C2C2C; }
        .bubble-fr.user { color: #1B2A4A; }
        .bubble-en {
            color: #9B9B9B; font-size: 13px; margin-top: 4px;
        }
        .current-speak-card {
            width: 100%; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; margin-top: 4px;
        }
        .current-user-bubble {
            max-width: 80%;
            padding-top: 16px;
            padding-right: 48px;
            position: relative;
            border: 1.5px solid transparent;
        }
        .current-user-bubble.pass { border-color: rgba(76,175,80,0.7); }
        .current-user-bubble.fail { border-color: rgba(211,84,84,0.6); }
        .current-audio-btn {
            position: absolute; top: 10px; right: 10px; width: 32px; height: 32px; border-radius: 16px;
            background: rgba(232,134,58,0.08); color: #E8863A; border: none;
            display: flex; align-items: center; justify-content: center;
        }
        .dialogue-bottom {
            padding: 0 24px 28px; display: flex; flex-direction: column; align-items: center; min-height: 130px;
        }
        .lesson-start-screen { flex: 1; overflow-y: auto; padding: 60px 28px; }
        .start-head { text-align: center; }
        .cefr-badge {
            display: inline-block; background: #1B2A4A; color: #FFF; border-radius: 8px;
            padding: 6px 14px; margin-bottom: 20px; font-size: 14px; font-weight: 700; letter-spacing: 1px;
        }
        .start-main-title { color: #2C2C2C; font-size: 28px; font-weight: 700; line-height: 34px; }
        .start-fr-title { color: #E8863A; font-size: 18px; font-style: italic; margin-top: 6px; }
        .start-meta { display: flex; justify-content: center; gap: 24px; margin-top: 20px; color: #9B9B9B; font-size: 14px; }
        .overview-card {
            width: 100%; background: #FFF; border-radius: 16px; padding: 20px; margin-top: 28px; border: 1px solid #E8E3DC;
        }
        .overview-title { color: #2C2C2C; font-size: 17px; font-weight: 600; }
        .overview-sub { color: #6B6B6B; font-size: 14px; line-height: 20px; margin-top: 6px; }
        .topic-label {
            color: #9B9B9B; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 16px; margin-bottom: 10px;
        }
        .topic-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .topic-chip {
            width: calc(50% - 4px); background: #FBF5EF; border-radius: 10px; padding: 8px 10px;
        }
        .topic-chip .topic-fr { color: #E8863A; font-size: 14px; font-weight: 600; }
        .topic-chip .topic-en { color: #9B9B9B; font-size: 12px; margin-top: 2px; }
        .activity-row {
            display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; padding-top: 16px; border-top: 1px solid #E8E3DC;
        }
        .activity-chip {
            background: #FBF5EF; border-radius: 8px; color: #1B2A4A; font-size: 13px; font-weight: 500;
            padding: 6px 10px;
        }
        .start-actions { margin-top: 32px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .back-link { border: none; background: transparent; color: #6B6B6B; font-size: 15px; font-weight: 500; }
        .test-screen { flex: 1; display: flex; flex-direction: column; }
        .test-header {
            display: flex; justify-content: space-between; align-items: center; padding: 12px 20px;
        }
        .test-header-text { color: #6B6B6B; font-size: 14px; font-weight: 500; }
        .test-exit {
            border: none; background: transparent; color: #6B6B6B; width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center;
        }
        .test-progress { padding: 0 20px; }
        .test-track { height: 4px; background: #E8E3DC; border-radius: 2px; overflow: hidden; }
        .test-fill { height: 4px; background: #1B2A4A; border-radius: 2px; }
        .test-label { font-size: 12px; color: #9B9B9B; text-align: right; margin-top: 4px; }

        svg { stroke-linecap: round; stroke-linejoin: round; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes micPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
        @keyframes bubblePulse { 0% { transform: scale(1); } 45% { transform: scale(1.012); } 100% { transform: scale(1); } }
        @keyframes pillPop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div class="mockup">
        <div class="notch"></div>
        <div class="screen">
            <div class="status-bar"></div>
            <div class="lesson-header">
                <div class="header-row">
                    <button type="button" class="back-btn" id="backBtn" aria-label="Go back">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
                    </button>
                    <div class="lesson-title" id="lessonTitle">Lesson Simulator</div>

                <div class="sim-tag" id="simTag">Mirror sim for LessonPlayer / Narrate / Speak / Results</div>
                <div class="progress-wrap" id="progressWrap">
                    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
                    <div class="progress-label" id="progressLabel"></div>
                </div>
            </div>
            <div class="content" id="content"></div>
        </div>
    </div>

<script>
const ICO = {
    volume2: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>',
    mic: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>',
    check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>',
    x: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>',
    arrowRight: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>',
    rotateCcw: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>',
    star: '<svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.8l2.87 5.82 6.42.94-4.64 4.52 1.1 6.4L12 17.45l-5.75 3.03 1.1-6.4-4.64-4.52 6.42-.94L12 2.8z"/></svg>',
};

const LESSONS = {
    a1_lesson_01: {
        id: "a1_lesson_01",
        cefrLevel: "A1",
        title: "First Words",
        titleFr: "Premiers mots",

function esc(text) {
    const div = document.createElement("div");
    div.textContent = text == null ? "" : String(text);
    return div.innerHTML;
}

function clearTimers() {
    state.timers.forEach(clearTimeout);
    state.timers = [];
}

function addTimer(fn, ms) {
    const id = setTimeout(fn, ms);
    state.timers.push(id);
    return id;
}

function currentLesson() {
    return state.selectedLessonId ? LESSONS[state.selectedLessonId] : null;
}

function currentPage() {
    const lesson = currentLesson();
    if (!lesson) return null;
    return lesson.pages[state.pageIdx] || null;
}

function formatTranscript(raw) {
    if (!raw) return "";
    return '"' + esc(raw.charAt(0).toUpperCase() + raw.slice(1)) + '"';
}

function buildFrenchTerms(page, lesson) {
    const set = new Set();
    lesson.pages.forEach((p) => {
        (p.vocab || []).forEach((w) => set.add(w.french.toLowerCase()));
        if (p.speakTarget) set.add(p.speakTarget.toLowerCase());
    });
    (page.vocab || []).forEach((w) => set.add(w.french.toLowerCase()));
    if (page.speakTarget) set.add(page.speakTarget.toLowerCase());
    return [...set].sort((a, b) => b.length - a.length);
}

function highlightNarration(page, lesson) {
    const text = page.narration || "";
    if (!text) return "";
    const terms = buildFrenchTerms(page, lesson).map((t) => t.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));
    const vocabAlt = terms.join("|");
    const quotedCapture = '(["\\u201C]([A-Za-z\\u00C0-\\u024F\\u2019\\u0027/ -]+?)["\\u201D])';
    const regex = new RegExp(vocabAlt ? `(${vocabAlt})|${quotedCapture}` : quotedCapture, "gi");

    let out = "";
    let last = 0;
    let match;
    while ((match = regex.exec(text)) !== null) {
        if (match.index > last) out += esc(text.slice(last, match.index));
        if (vocabAlt && match[1]) {
            out += '<span class="french-hl">' + esc(match[1]) + "</span>";
            last = match.index + match[1].length;
        } else {
            const fullQuoted = vocabAlt ? match[2] : match[1];
            const innerText = vocabAlt ? match[3] : match[2];
            const isFrenchQuote = buildFrenchTerms(page, lesson).includes(innerText.toLowerCase());
            out += '<span class="' + (isFrenchQuote ? "french-hl" : "translation-hl") + '">' + esc(fullQuoted) + "</span>";
            last = match.index + fullQuoted.length;
        }
    }
    if (last < text.length) out += esc(text.slice(last));
    return out;
}

function fitFrench(el) {
    if (!el) return;
    let fs = 28;
    el.style.fontSize = fs + "px";
    el.style.whiteSpace = "nowrap";
    while (el.scrollWidth > el.clientWidth && fs > 18) {
        fs -= 1;
        el.style.fontSize = fs + "px";
    }
    if (el.scrollWidth > el.clientWidth) el.style.whiteSpace = "";
}

function setHeader() {
    const lesson = currentLesson();
    const headerVisible = state.phase === "pages";
    els.lessonHeader.style.display = headerVisible ? "block" : "none";
    if (!headerVisible) return;
    if (state.phase === "start") {
        els.title.textContent = "Lesson Simulator";
        els.tag.textContent = "Mirror sim for LessonPlayer / Narrate / Speak / Results";
        els.progressWrap.style.opacity = "0";
        els.progressLabel.textContent = "";
        els.progressFill.style.width = "0%";
        return;
    }
    if (state.phase === "game") {
        els.title.textContent = "Practice Game";
        els.tag.textContent = "Recommended from LessonResults";
        els.progressWrap.style.opacity = "0";
        return;
    }
    if (!lesson) return;
    els.title.textContent = lesson.title;
    els.tag.textContent = lesson.id.replaceAll("_", " ").toUpperCase() + " · Full flow simulation";
    if (state.phase === "results") {
        els.progressWrap.style.opacity = "0";
        return;
    }
    if (state.phase === "test") {
        els.progressWrap.style.opacity = "1";
        const total = (lesson.testQuestions || []).length || 1;
        const pct = ((state.testIdx + 1) / total) * 100;
        els.progressFill.style.width = pct + "%";
        els.progressLabel.textContent = "Test: " + (state.testIdx + 1) + " of " + total;
        els.tag.textContent = "Mini-Test simulation";
        return;
    }
    if (state.phase === "dialogue") {
        els.progressWrap.style.opacity = "0";
        els.tag.textContent = "Dialogue capstone simulation";
        return;
    }
    els.progressWrap.style.opacity = "1";
    const total = lesson.pages.length;
    const pct = ((state.pageIdx + 1) / total) * 100;
    els.progressFill.style.width = pct + "%";
    els.progressLabel.textContent = "Page " + (state.pageIdx + 1) + " of " + total;
}

function collectWordsFromLesson(lesson) {
    const seen = new Set();
    const out = [];
    lesson.pages.forEach((p) => {
        (p.vocab || []).forEach((w) => {
            if (!seen.has(w.french.toLowerCase())) {
                seen.add(w.french.toLowerCase());
                out.push(w);
            }
        });
        if (p.speakTarget && !seen.has(p.speakTarget.toLowerCase())) {
            seen.add(p.speakTarget.toLowerCase());
            out.push({ french: p.speakTarget, english: p.speakTargetEnglish || "" });
        }
    });
    return out;
}

function getGameRecommendations(pages) {
    const hasDialogue = pages.some((p) => p.type === "dialogue");
    const speakPages = pages.filter((p) => p.type === "speak" || !!p.speakTarget);
    const hasPhrases = speakPages.some((p) => ((p.speakTarget || "").split(" ").length > 2));
    const games = ["word-catch"];
    games.push(hasPhrases ? "speed-say" : "echo-game");
    games.push(hasDialogue ? "echo-game" : "translation-sprint");
    const unique = [...new Set(games)];
    const fallbacks = ["translation-sprint", "echo-game", "speed-say", "word-catch"];
    for (const fb of fallbacks) {
        if (unique.length >= 3) break;
        if (!unique.includes(fb)) unique.push(fb);
    }
    return unique.slice(0, 3);
}

function startDialogue(lessonId) {

function beginLessonPages() {

}

function goNextPage() {
    const lesson = currentLesson();

    clearTimers();
    state.currentSpeak = null;

        render();
        return;
    }
    render();
}

function attachMicHandlers(micEl, onStart, onStop) {
    if (!micEl) return;
    const begin = (e) => {
        e.preventDefault();
        onStart();
    };
    const end = (e) => {
        e.preventDefault();
        onStop();
    };
    micEl.addEventListener("mousedown", begin);
    micEl.addEventListener("touchstart", begin, { passive: false });
    window.addEventListener("mouseup", end, { once: true });
    window.addEventListener("touchend", end, { once: true });
}

function renderSpeakBlock({ parent, prompt, target, targetEnglish, wrongTranscript, onComplete, trackToPageScores = true }) {
    parent.innerHTML = `
        <div class="card" id="speakCard">
            <button type="button" class="icon-btn" id="speakIcon">${ICO.volume2}</button>
            <div class="text-area">
                <div class="french-text" id="speakTarget">"${esc(target)}"</div>
                <div class="english-hint">${esc(targetEnglish || "")}</div>
            </div>
            <div class="result-slot" id="speakResult"><div class="prompt-label">${esc(prompt || "Say it back")}</div></div>
        </div>
        <div class="feedback-stack" id="speakFeedback"></div>
        <div class="bottom-area" id="speakBottom"></div>
    `;
    fitFrench(parent.querySelector("#speakTarget"));

    const speak = {
        phase: "ready",
        nextOutcome: "wrong",
        attempts: 0
    };
    state.currentSpeak = speak;

    const card = parent.querySelector("#speakCard");
    const icon = parent.querySelector("#speakIcon");
    const result = parent.querySelector("#speakResult");
    const feedback = parent.querySelector("#speakFeedback");
    const bottom = parent.querySelector("#speakBottom");

    function mountBottom() {
        const showTry = speak.phase === "retry";
        const showMic = speak.phase !== "done";
        bottom.innerHTML = `
            ${showMic ? `<button type="button" class="mic-btn ${speak.phase === "ready" ? "pulse" : ""}" id="micBtn">${ICO.mic}</button><div class="mic-hint" id="micHint">${speak.phase === "recording" ? "Listening..." : "Hold until word appears, then let go"}</div>` : ""}
            ${showTry ? `<button type="button" class="retry-button" id="retryBtn">${ICO.rotateCcw} Try again</button>` : ""}
            ${speak.phase === "done" ? `<button type="button" class="btn-primary" id="continueBtn">Continue ${ICO.arrowRight}</button>` : ""}
        `;
        if (showMic) {
            const mic = bottom.querySelector("#micBtn");
            const hint = bottom.querySelector("#micHint");
            attachMicHandlers(
                mic,
                () => {
                    if (speak.phase !== "ready") return;
                    speak.phase = "recording";
                    state.recordingStart = Date.now();
                    mic.classList.remove("pulse");
                    mic.classList.add("recording");
                    hint.textContent = "Listening...";
                },
                () => {
                    if (speak.phase !== "recording") return;
                    const heldMs = Date.now() - state.recordingStart;
                    if (heldMs < 400) return;
                    mic.classList.remove("recording");
                    hint.textContent = "";
                    resolveAttempt();
                }
            );
        }
        const retryBtn = bottom.querySelector("#retryBtn");
        if (retryBtn) {
            retryBtn.addEventListener("click", () => {
                speak.phase = "ready";
                card.classList.remove("fail");
                icon.classList.remove("fail");
                icon.innerHTML = ICO.volume2;
                result.innerHTML = '<div class="prompt-label">' + esc(prompt || "Say it back") + "</div>";
                feedback.innerHTML = "";
                mountBottom();
            });
        }
        const continueBtn = bottom.querySelector("#continueBtn");
        if (continueBtn) continueBtn.addEventListener("click", onComplete);
    }

    function setFailUI() {
        card.classList.remove("pass");
        card.classList.add("fail");
        icon.classList.remove("pass");
        icon.classList.add("fail");
        icon.innerHTML = ICO.x;
        result.innerHTML =
            '<div class="transcript fail">' + formatTranscript(wrongTranscript || "bonjour") + "</div>" +
            '<div class="score-pill warn"><span class="score-pct warn">38%</span><span class="score-lbl warn">Try again</span></div>';
        feedback.innerHTML = `
            <div class="retry-area">
                <div class="retry-score-big">38%</div>
                <div class="retry-lbl">Listen again and try:</div>
                <button type="button" class="listen-btn-sm">${ICO.volume2} Hear it again</button>
            </div>
        `;
        speak.phase = "retry";
        speak.nextOutcome = "right";
        mountBottom();
    }

    function setPassUI() {
        card.classList.remove("fail");
        card.classList.add("pass");
        icon.classList.remove("fail");
        icon.classList.add("pass");
        icon.innerHTML = ICO.check;
        result.innerHTML =
            '<div class="transcript pass">' + formatTranscript(target) + "</div>" +
            '<div class="score-pill"><span class="score-pct">96%</span><span class="score-lbl">Excellent</span></div>';
        feedback.innerHTML = "";
        speak.phase = "done";
        mountBottom();
    }

    function resolveAttempt() {
        speak.attempts += 1;
        if (speak.nextOutcome === "wrong") {
            if (trackToPageScores) recordPageScoreEntry("speak", 0.38, "speak");
            setFailUI();
            return;
        }
        if (trackToPageScores) recordPageScoreEntry("speak", 0.96, "speak");
        state.learnedWords.add(target.toLowerCase());
        setPassUI();
    }

    mountBottom();
}

function renderRespondPage(page) {
    const options = page.respondOptions || [];
    const correct = page.respondCorrectAnswer || "";
    let phase = "ready";
    let recordingStart = 0;
    let liveTranscript = "";
    let score = 0;

    els.content.innerHTML = `
        <div class="center-content" style="padding-top:40px;">
            <div class="card" id="respondCard">
                <div class="text-area" style="padding:0 10px">
                    <div class="french-text" style="font-size:22px;color:#2C2C2C;font-family:inherit;line-height:1.35;">${esc(page.respondQuestion || "")}</div>
                </div>
                <div class="result-slot" id="respondResult"><div class="prompt-label">Say it back</div></div>
            </div>
            <div class="feedback-stack" id="respondFeedback"></div>
        </div>
        <div class="bottom-area" id="respondBottom"></div>
    `;
    const card = els.content.querySelector("#respondCard");
    const resultEl = els.content.querySelector("#respondResult");
    const feedbackEl = els.content.querySelector("#respondFeedback");
    const bottomEl = els.content.querySelector("#respondBottom");

    function finalize(isCorrect, method, answer, pct) {
        phase = "answered";
        score = isCorrect ? (method === "tap" ? 0.5 : Math.max(0.76, pct / 100)) : (method === "tap" ? 0 : 0.25);
        recordPageScoreEntry("respond", score, method);
        resultEl.innerHTML = '<div class="transcript ' + (isCorrect ? "pass" : "fail") + '">' + formatTranscript(answer) + "</div>";
        feedbackEl.innerHTML = `
            <div class="retry-area">
                <div class="retry-score-big">${Math.round(score * 100)}%</div>
                ${!isCorrect ? `<div class="retry-lbl">Correct: ${esc(correct)}</div>` : ""}
                ${!isCorrect && page.respondExplanation ? `<div class="retry-lbl" style="font-size:13px">${esc(page.respondExplanation)}</div>` : ""}
            </div>
        `;
        mountBottom();
    }

    function mountBottom() {
        if (phase === "answered") {
            bottomEl.innerHTML = `<button type="button" class="btn-primary" id="respondNext">Continue ${ICO.arrowRight}</button>`;
            bottomEl.querySelector("#respondNext").addEventListener("click", goNextPage);
            return;
        }
        bottomEl.innerHTML = `
            <button type="button" class="mic-btn pulse" id="respondMic">${ICO.mic}</button>
            <div class="mic-hint" id="respondHint">${phase === "recording" ? "Listening..." : "Hold until word appears, then let go"}</div>
            ${options.length > 0 ? `<div class="retry-lbl" style="margin-top:12px;margin-bottom:6px;">or tap for less points:</div>` : ""}
            <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:8px" id="respondOpts">
                ${options.map((o) => `<button class="retry-button" style="margin-top:0;padding:10px 14px;border-color:#E8E3DC;color:#2C2C2C;" data-opt="${esc(o.text)}">${esc(o.text)}</button>`).join("")}
            </div>
        `;
        const mic = bottomEl.querySelector("#respondMic");
        const hint = bottomEl.querySelector("#respondHint");
        attachMicHandlers(
            mic,
            () => {
                if (phase === "answered") return;
                phase = "recording";
                recordingStart = Date.now();
                mic.classList.add("recording");
                mic.classList.remove("pulse");
                hint.textContent = "Listening...";
            },
            () => {
                if (phase !== "recording") return;
                if (Date.now() - recordingStart < 400) return;
                mic.classList.remove("recording");
                liveTranscript = (page.respondCorrectSpoken || correct || "").toLowerCase();
                const pass = Math.random() > 0.25;
                finalize(pass, "speak", pass ? liveTranscript : "incorrect answer", pass ? 88 : 25);
            }
        );
        bottomEl.querySelectorAll("[data-opt]").forEach((btn) => {
            btn.addEventListener("click", () => {
                const ans = btn.getAttribute("data-opt");
                finalize(ans.toLowerCase() === correct.toLowerCase(), "tap", ans, ans.toLowerCase() === correct.toLowerCase() ? 50 : 0);
            });
        });
    }
    mountBottom();
}

    const lesson = currentLesson();
    const q = (lesson.testQuestions || [])[state.testIdx];
    if (!q) {
        state.phase = "results";
        render();
        return;
    }

    function completeQuestion(sc) {
        state.testScores.push(sc);
        state.testIdx += 1;
        if (state.testIdx >= (lesson.testQuestions || []).length) {
            state.phase = "results";
        }
        render();
    }

    if (q.type === "speak") {
        const total = (lesson.testQuestions || []).length || 1;
        const pct = ((state.testIdx + 1) / total) * 100;

    const options = q.respondOptions || [];
    const total = (lesson.testQuestions || []).length || 1;
    const pct = ((state.testIdx + 1) / total) * 100;
    els.content.innerHTML = `
        <div class="test-screen">
            <div class="test-header">
                <div class="test-header-text">Mini-Test</div>
                <button class="test-exit" id="testExitBtn" type="button">${ICO.x}</button>
            </div>
            <div class="test-progress">
                <div class="test-track"><div class="test-fill" style="width:${pct}%"></div></div>
                <div class="test-label">Test: ${state.testIdx + 1} of ${total}</div>
            </div>
            <div class="center-content" style="padding-top:40px;">
                <div class="card">
                    <div class="text-area" style="padding:0 10px">
                        <div class="french-text" style="font-size:22px;color:#2C2C2C;font-family:inherit;line-height:1.35;">${esc(q.respondQuestion || "")}</div>
                    </div>
                </div>
            </div>
            <div class="bottom-area">
                <button type="button" class="mic-btn pulse" id="testMic">${ICO.mic}</button>
                <div class="mic-hint">Hold until word appears, then let go</div>
                ${options.length ? `<div class="retry-lbl" style="margin-top:12px;margin-bottom:6px;">or tap for less points:</div>` : ""}
                <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:8px;">
                    ${options.map((o) => `<button class="retry-button" style="margin-top:0;padding:10px 14px;border-color:#E8E3DC;color:#2C2C2C;" data-test-opt="${esc(o.text)}">${esc(o.text)}</button>`).join("")}
                </div>

            </div>
        </div>
    `;
    els.content.querySelector("#testExitBtn").addEventListener("click", () => {

        state.selectedLessonId = null;
        render();
    });
    els.content.querySelector("#testNext").addEventListener("click", () => completeQuestion(0.8));

function renderResults() {
    const lesson = currentLesson();
    if (!lesson) return;
    const vocab = collectWordsFromLesson(lesson);
    const recs = getGameRecommendations(lesson.pages);
    const testAvg = state.testScores.length ? (state.testScores.reduce((a, b) => a + b, 0) / state.testScores.length) : 0;
    const testScore = Math.round(testAvg * 100);
    const speakEntries = state.pageScoreEntries.filter((p) => p.type === "speak" || p.type === "dialogue");
    const pronAvg = speakEntries.length ? (speakEntries.reduce((a, b) => a + b.score, 0) / speakEntries.length) : 0;
    const pronScore = Math.round(pronAvg * 100);
    const respondEntries = state.pageScoreEntries.filter((p) => p.type === "respond");
    const spokenResponds = respondEntries.filter((p) => p.method === "speak");
    const spokenScore = respondEntries.length ? Math.round((spokenResponds.length / respondEntries.length) * 100) : 0;
    let stars = 0;
    if (testAvg >= 0.95) stars = 5;
    else if (testAvg >= 0.85) stars = 4;
    else if (testAvg >= 0.70) stars = 3;
    else if (testAvg >= 0.50) stars = 2;
    else if (testAvg > 0) stars = 1;
    const xp = stars >= 5 ? 200 : 100;
    const title = stars >= 5 ? "Perfect!" : stars >= 4 ? "Excellent!" : stars >= 3 ? "Great Job!" : stars >= 2 ? "Well Done!" : "Lesson Complete";

    els.content.innerHTML = `
        <div class="results-wrap">
            <div class="stars-row">${[1,2,3,4,5].map((i) => `<span class="${i <= stars ? "fill" : ""}">${ICO.star}</span>`).join("")}</div>
            <div class="results-title">${title}</div>
            <div class="xp-badge">+${xp} XP</div>
            <div class="score-grid">
                <div class="score-card"><div class="score-value">${testScore}%</div><div class="score-label">Test Score</div></div>
                <div class="score-card"><div class="score-value">${pronScore}%</div><div class="score-label">Pronunciation</div></div>
                <div class="score-card"><div class="score-value">${spokenScore}%</div><div class="score-label">Spoken Answers</div></div>
            </div>

            <div class="section-title">Words Learned (${vocab.length})</div>
            ${vocab.map((w) => `
                <div class="vocab-row">
                    <button type="button" class="vocab-play">${ICO.volume2}</button>
                    <div class="vocab-fr">${esc(w.french)}</div>
                    <div class="vocab-en">${esc(w.english || "")}</div>
                </div>
            `).join("")}

            <div class="section-title">Practice What You Learned</div>
            <button type="button" class="game-btn" id="playGameBtn">Play ${esc(GAME_NAME[recs[0]] || recs[0])}</button>
        </div>
        <div class="results-bottom">
            <button type="button" class="btn-primary" id="nextLessonBtn">Next Lesson ${ICO.arrowRight}</button>
            <button type="button" class="back-lessons" id="backLessonsBtn">${ICO.rotateCcw} Back to Lessons</button>
        </div>
    `;
    els.content.querySelector("#playGameBtn").addEventListener("click", () => {
        state.lastRecommendedGame = recs[0];
        state.phase = "game";
        render();
    });
    els.content.querySelector("#nextLessonBtn").addEventListener("click", () => {
        const order = Object.keys(LESSONS);

        <div class="dialogue-wrap">
            <div class="dialogue-header">Put it all together:</div>
            <div class="chat-area" id="chatArea"><div class="chat-content" id="chatContent"></div></div>
            <div class="dialogue-bottom" id="dialogueBottom"></div>
        </div>
    `;
    const chatArea = els.content.querySelector("#chatArea");
    const chatContent = els.content.querySelector("#chatContent");
    const dialogueBottom = els.content.querySelector("#dialogueBottom");

    function scorePercent() {
        return Math.round((state.dialogue.score || 0) * 100);
    }

    function isPassed() {
        return (state.dialogue.score || 0) >= 0.75;
    }

    function renderChat() {
        const d = state.dialogue;
        const html = exchanges.map((exchange, idx) => {
            const visible = idx <= d.currentExchange || d.completedExchanges.includes(idx);
            if (!visible) return "";
            const isCurrentUser = idx === d.currentExchange && exchange.speaker === "user";
            if (isCurrentUser) {
                const passClass = d.exchangeState === "user_scored" ? (isPassed() ? "pass" : "fail") : (d.exchangeState === "user_retry" ? "fail" : "");
                return `
                    <div class="current-speak-card">
                        <div class="bubble user-bubble current-user-bubble ${passClass}">
                            <button type="button" class="current-audio-btn">${ICO.volume2}</button>
                            <div class="bubble-speaker">You</div>
                            <div class="bubble-fr user">"${esc(exchange.french)}"</div>
                            ${exchange.english ? `<div class="bubble-en">${esc(exchange.english)}</div>` : ""}
                        </div>
                        ${d.liveTranscript ? `<div class="transcript ${d.exchangeState === "user_scored" ? (isPassed() ? "pass" : "fail") : d.exchangeState === "user_retry" ? "fail" : ""}">${formatTranscript(d.liveTranscript)}</div>` : ""}
                        ${d.liveTranscript && (d.exchangeState === "user_scored" || d.exchangeState === "user_retry") ? `
                            <div class="score-pill ${isPassed() ? "" : "warn"}">
                                <span class="score-pct ${isPassed() ? "" : "warn"}">${scorePercent()}%</span>
                                <span class="score-lbl ${isPassed() ? "" : "warn"}">${isPassed() ? (scorePercent() >= 90 ? "Excellent" : "Good") : "Try again"}</span>
                            </div>
                        ` : ""}
                        ${d.exchangeState === "user_retry" ? `
                            <div class="retry-area">
                                <div class="retry-score-big">${scorePercent()}%</div>
                                <div class="retry-lbl">Listen again and try:</div>
                                <button type="button" class="listen-btn-sm">${ICO.volume2} Hear it again</button>
                            </div>
                        ` : ""}
                    </div>
                `;
            }
            const tutor = exchange.speaker === "tutor";
            return `
                <div class="bubble ${tutor ? "tutor-bubble" : "user-bubble"}">
                    <div class="bubble-speaker">${tutor ? esc(characterName) : "You"}</div>
                    <div class="bubble-fr ${tutor ? "tutor" : "user"}">"${esc(exchange.french)}"</div>
                    <div class="bubble-en">${esc(exchange.english || "")}</div>
                </div>
            `;
        }).join("");
        chatContent.innerHTML = html;
        addTimer(() => { chatArea.scrollTop = chatArea.scrollHeight; }, 80);
    }

    function renderBottom() {
        const d = state.dialogue;
        if (d.dialogueComplete) {
            dialogueBottom.innerHTML = `<button type="button" class="btn-primary" id="dlgContinue">Continue ${ICO.arrowRight}</button>`;
            dialogueBottom.querySelector("#dlgContinue").addEventListener("click", () => {
                if (state.dialogueStandalone) {
                    state.phase = "results";
                    render();
                    return;
                }
                recordPageScoreEntry("dialogue", d.scores.length ? (d.scores.reduce((a, b) => a + b, 0) / d.scores.length) : 0, "speak");
                goNextPage();
            });
            return;
        }
        const showMic = d.exchangeState === "user_ready" || d.exchangeState === "user_retry" || d.exchangeState === "user_recording";
        if (!showMic) {
            dialogueBottom.innerHTML = '<div class="mic-hint"></div>';
            return;
        }
        dialogueBottom.innerHTML = `
            <button type="button" class="mic-btn ${d.exchangeState !== "user_recording" ? "pulse" : "recording"}" id="dlgMic">${ICO.mic}</button>
            <div class="mic-hint">${d.exchangeState === "user_recording" ? "Listening..." : "Hold until word appears, then let go"}</div>
            ${d.exchangeState === "user_retry" ? `<button type="button" class="retry-button" id="dlgRetry">${ICO.rotateCcw} Try again</button>` : ""}
        `;
        const mic = dialogueBottom.querySelector("#dlgMic");
        attachMicHandlers(
            mic,
            () => {
                if (state.dialogue.exchangeState !== "user_ready" && state.dialogue.exchangeState !== "user_retry") return;
                state.dialogue.exchangeState = "user_recording";
                state.dialogue.recordingStart = Date.now();
                renderBottom();
            },
            () => {
                if (state.dialogue.exchangeState !== "user_recording") return;
                if (Date.now() - state.dialogue.recordingStart < 400) return;
                processUserResult();
            }
        );
        const retryBtn = dialogueBottom.querySelector("#dlgRetry");
        if (retryBtn) {
            retryBtn.addEventListener("click", () => {
                state.dialogue.exchangeState = "user_ready";
                state.dialogue.liveTranscript = "";
                renderChat();
                renderBottom();
            });
        }
    }

    function handleDialogueComplete() {
        const d = state.dialogue;
        d.dialogueComplete = true;
        renderChat();
        renderBottom();
    }

    function moveForwardFromUser() {
        const d = state.dialogue;
        const nextIdx = d.currentExchange + 1;
        d.completedExchanges.push(d.currentExchange);
        d.liveTranscript = "";
        d.exchangeState = "tutor_playing";
        if (nextIdx >= exchanges.length) {
            handleDialogueComplete();
            return;
        }
        d.currentExchange = nextIdx;
        d.attempts = 0;
        renderChat();
        renderBottom();
        runTurn();
    }

    function processUserResult() {
        const d = state.dialogue;
        const exchange = exchanges[d.currentExchange];
        d.attempts += 1;
        if (d.attempts === 1) {
            d.liveTranscript = exchange.french.split(" ").slice(0, 1).join(" ").toLowerCase();
            d.score = 0.42;
            d.exchangeState = "user_retry";
            renderChat();
            renderBottom();
            return;
        }
        d.liveTranscript = exchange.french.toLowerCase();
        d.score = 0.93;
        d.scores.push(d.score);
        d.exchangeState = "user_scored";
        renderChat();
        renderBottom();
        addTimer(() => moveForwardFromUser(), 1400);
    }

    function runTurn() {
        const d = state.dialogue;
        const ex = exchanges[d.currentExchange];
        if (!ex) return;
        if (ex.speaker === "tutor") {
            d.exchangeState = "tutor_playing";
            renderChat();
            renderBottom();
            addTimer(() => {
                const nextIdx = d.currentExchange + 1;
                if (nextIdx >= exchanges.length) {
                    handleDialogueComplete();
                    return;
                }
                if (exchanges[nextIdx].speaker === "user") {
                    d.currentExchange = nextIdx;
                    d.exchangeState = "user_ready";
                    d.attempts = 0;
                    renderChat();
                    renderBottom();
                } else {
                    d.currentExchange = nextIdx;
                    runTurn();
                }
            }, 1100);
            return;
        }
        d.exchangeState = "user_ready";
        renderChat();
        renderBottom();
    }

    renderChat();
    renderBottom();
    runTurn();
}

function renderPages() {
    const lesson = currentLesson();
    const page = currentPage();
    if (!lesson || !page) return;
    if (page.type === "narrate") return renderNarratePage(page, lesson);
    if (page.type === "speak") return renderSpeakPage(page);
    if (page.type === "respond") return renderRespondPage(page);
    if (page.type === "dialogue") return renderDialoguePage();
    if (page.type === "picture_prompt") return renderRespondPage(page);
    return renderNarratePage(page, lesson);
}

function render() {
    clearTimers();
    setHeader();
    if (state.phase === "start") {
        renderStart();
        return;
    }
    if (state.phase === "lesson_start") {
        renderLessonStartScreen();
        return;
    }
    if (state.phase === "pages") {
        renderPages();
        return;
    }
    if (state.phase === "test") {
        renderMiniTest();
        return;
    }
    if (state.phase === "results") {
        renderResults();
        return;
    }
    if (state.phase === "dialogue") {
        renderDialoguePage();
        return;
    }
    renderGamePreview();
}

els.backBtn.addEventListener("click", () => {
    if (state.phase === "start") return;
    if (state.phase === "results" || state.phase === "game" || state.phase === "dialogue" || state.phase === "test") {
        state.phase = "start";
        state.selectedLessonId = null;
        render();
        return;
    }
    state.phase = "start";
    state.selectedLessonId = null;
    render();
});

render();

let autoplayBusy = false;
function autoplayHoldMic(button, holdMs = 900) {
    if (!button || autoplayBusy) return;
    autoplayBusy = true;
    button.dispatchEvent(new MouseEvent("mousedown", { bubbles: true }));
    setTimeout(() => {
        button.dispatchEvent(new MouseEvent("mouseup", { bubbles: true }));
        autoplayBusy = false;
    }, holdMs);
}

function runAutoplayStep() {
    if (!autoplay || autoplayBusy) return;
    if (state.phase === "start") {
        document.querySelector("[data-lesson]")?.click();
        return;
    }
    if (state.phase === "lesson_start") {
        document.getElementById("beginLessonBtn")?.click();
        return;
    }
    if (state.phase === "pages") {
        const continueBtn = document.getElementById("continueBtn");
        if (continueBtn) {
            continueBtn.click();
            return;
        }
        const respondNext = document.getElementById("respondNext");
        if (respondNext) {
            respondNext.click();
            return;
        }
        const retryBtn = document.getElementById("retryBtn");
        if (retryBtn) {
            retryBtn.click();
            return;
        }
        const micBtn = document.querySelector(".mic-btn:not(.recording)");
        if (micBtn) autoplayHoldMic(micBtn);
        return;
    }
    if (state.phase === "test") {
        const testNext = document.getElementById("testNext");
        if (testNext) {
            testNext.click();
            return;
        }
        const testMic = document.getElementById("testMic");
        if (testMic && !testMic.classList.contains("recording")) autoplayHoldMic(testMic);
        return;
    }
    if (state.phase === "dialogue") {
        const micBtn = document.querySelector(".mic-btn:not(.recording)");
        if (micBtn) {
            autoplayHoldMic(micBtn);
            return;
        }
        document.getElementById("dlgContinue")?.click();
        return;
    }
    if (state.phase === "results" && loop) {
        document.getElementById("backLessonsBtn")?.click();
    }
}

if (autoplay) {
    setTimeout(runAutoplayStep, 700);
    setInterval(runAutoplayStep, autoplayStepMs);
}
</script>
